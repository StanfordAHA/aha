# Initial version of this file was generated with extensive help from .buildkite/bin/generate-weekly-pipeline.sh

agents: { docker: true }
env:    { APP: "aha/bin/app --update . /aha/aha --subgroup full" }

# Define repeatable NO_CLONE and WAIT objects for use in steps
definitions:
  plugins: &NO_CLONE
    - uber-workflow/run-without-clone:
    - improbable-eng/metahook:
        pre-checkout: pwd
  wait: &WAIT
    continue_on_failure:
      true

  # CLONE aha repo but DO NOT initialize submodules
  cloney: &CLONE |
        set -x && pwd
        aha_clone=$(pwd)
        cd .. && /bin/rm -rf $$aha_clone
        git clone https://github.com/StanfordAHA/aha $$aha_clone && cd $$aha_clone
        git pull && git checkout $$BUILDKITE_COMMIT

